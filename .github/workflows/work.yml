name: work

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repository (owner/repo), or blank for all'
        required: false

env:
  GIT_AUTHOR_NAME: ${{ github.actor }}
  GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
  GIT_COMMITTER_NAME: ${{ github.actor }}
  GIT_COMMITTER_EMAIL: ${{ github.actor }}@users.noreply.github.com

jobs:
  work:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: work-${{ matrix.repo }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ inputs.repo && fromJson(format('["{0}"]', inputs.repo)) || fromJson('["whilp/ah","whilp/cosmic","whilp/working"]') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ah,cosmic,working

      # sanitize repo name for use in artifact names (GitHub rejects slashes)
      - name: Set safe repo name
        id: meta
        run: echo "safe_repo=${REPO//\//-}" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ matrix.repo }}

      - name: Work
        env:
          REPO: ${{ matrix.repo }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: make work

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: work-${{ steps.meta.outputs.safe_repo || strategy.job-index }}
          path: o/
